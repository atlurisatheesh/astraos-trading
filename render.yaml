services:
  - type: web
    name: astraos-backend
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    region: singapore
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: AstraOS
      - key: DATABASE_URL
        fromDatabase:
          name: astraos-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini_free
      - key: MARKET_DATA_PROVIDER
        value: yfinance
      - key: BROKER_PROVIDER
        value: paper
      - key: NEWS_PROVIDER
        value: rss_gdelt
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_ID
        sync: false
      - key: ANGEL_PASSWORD
        sync: false
      - key: ANGEL_TOTP_SECRET
        sync: false
      - key: BROKER_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://web-livid-one-87.vercel.app,http://localhost:3000
      - key: ENFORCE_HTTPS
        value: "true"

databases:
  - name: astraos-db
    plan: free
    databaseName: astraos
    user: astraos
